services:
  postgres:
    image: postgres:16

    container_name: mozpay-postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mozpay

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: mozpay-api

    restart: always

    depends_on:
      - postgres

    ports:
      - "3000:3000"

    env_file:
      - .env.docker

volumes:
  postgres_data: